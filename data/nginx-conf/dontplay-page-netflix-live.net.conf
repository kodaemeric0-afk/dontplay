# HTTP → HTTPS redirect pour netflix-live.net
server {
  listen 80;
  server_name netflix-live.net;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl;
  server_name netflix-live.net;
  ssl_certificate     /etc/letsencrypt/live/netflix-live.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/netflix-live.net/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  real_ip_header CF-Connecting-IP;
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  set_real_ip_from 2400:cb00::/32;
  set_real_ip_from 2606:4700::/32;
  set_real_ip_from 2803:f800::/32;
  set_real_ip_from 2405:b500::/32;
  set_real_ip_from 2405:8100::/32;
  set_real_ip_from 2a06:98c0::/29;
  set_real_ip_from 2c0f:f248::/32;
  root /var/www/dontplay/data/pages/6223125c-934a-4308-a39f-3f080885f8eb;
  index index.php;
  server_tokens off;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  # Bloquer fichiers cachés, logs, backups
  location ~ /\. { deny all; return 404; }
  location ~* \.(log|sh|sql|env|bak|old|tmp)$ { deny all; return 404; }
  # Bloquer fichiers sensibles config/firewall (jamais accessibles via HTTP)
  location ~* ^/(config\.php|firewall\.php|firewall_config\.php)$ { deny all; return 404; }
  # Bloquer panel interne et fichiers redirect sensibles
  location ~* ^/panel/ { deny all; return 404; }
  location ~* ^/redirect/(redirects\.txt|otps\.txt)$ { deny all; return 404; }
  # PHP-FPM pour tous les .php autorisés
  location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_param DOCUMENT_ROOT /var/www/dontplay/data/pages/6223125c-934a-4308-a39f-3f080885f8eb;
    fastcgi_param SCRIPT_FILENAME /var/www/dontplay/data/pages/6223125c-934a-4308-a39f-3f080885f8eb$fastcgi_script_name;
  }
  location / { try_files $uri $uri/ /index.php?$query_string; }
}
